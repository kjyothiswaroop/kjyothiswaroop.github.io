<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Domain 0 box -->
  <rect x="20" y="20" width="300" height="480" rx="12" fill="#FFF3E0" stroke="#E65100" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="52" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">Domain 0 — CycloneDDS</text>

  <!-- Unitree G1 SDK -->
  <rect x="45" y="75" width="250" height="70" rx="8" fill="#FF9800" stroke="#E65100" stroke-width="1.5"/>
  <text x="170" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Unitree G1 SDK</text>
  <text x="170" y="122" text-anchor="middle" font-size="11" fill="white">Joint States, IMU, LowState</text>

  <!-- Locomotion -->
  <rect x="45" y="165" width="250" height="55" rx="8" fill="#FFB74D" stroke="#E65100" stroke-width="1.5"/>
  <text x="170" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#4E342E">Locomotion Interface</text>
  <text x="170" y="206" text-anchor="middle" font-size="11" fill="#4E342E">cmd_vel execution</text>

  <!-- Voice Query -->
  <rect x="45" y="240" width="250" height="70" rx="8" fill="#FFB74D" stroke="#E65100" stroke-width="1.5"/>
  <text x="170" y="267" text-anchor="middle" font-size="14" font-weight="bold" fill="#4E342E">Voice Query</text>
  <text x="170" y="287" text-anchor="middle" font-size="11" fill="#4E342E">Whisper STT + Microphone</text>

  <!-- jsPublisher -->
  <rect x="45" y="330" width="250" height="55" rx="8" fill="#FFB74D" stroke="#E65100" stroke-width="1.5"/>
  <text x="170" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#4E342E">jsPublisher</text>
  <text x="170" y="371" text-anchor="middle" font-size="11" fill="#4E342E">Joint State Bridge</text>

  <!-- Robot State Publisher -->
  <rect x="45" y="405" width="250" height="55" rx="8" fill="#FFB74D" stroke="#E65100" stroke-width="1.5"/>
  <text x="170" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#4E342E">Robot State Publisher</text>
  <text x="170" y="446" text-anchor="middle" font-size="11" fill="#4E342E">URDF + TF</text>

  <!-- Domain Bridge box -->
  <rect x="370" y="20" width="120" height="480" rx="12" fill="#E8EAF6" stroke="#283593" stroke-width="2" filter="url(#shadow)"/>
  <text x="430" y="52" text-anchor="middle" font-size="15" font-weight="bold" fill="#283593">Domain</text>
  <text x="430" y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#283593">Bridge</text>

  <!-- Bridge topics -->
  <text x="430" y="110" text-anchor="middle" font-size="10" fill="#283593">joint_states  --></text>
  <text x="430" y="130" text-anchor="middle" font-size="10" fill="#283593">tf, tf_static  --></text>
  <text x="430" y="150" text-anchor="middle" font-size="10" fill="#283593">robot_desc  --></text>
  <text x="430" y="190" text-anchor="middle" font-size="10" fill="#C62828">&lt;--  cmd_vel</text>
  <text x="430" y="230" text-anchor="middle" font-size="10" fill="#283593">query  --></text>
  <text x="430" y="250" text-anchor="middle" font-size="10" fill="#C62828">&lt;--  tts</text>

  <!-- Arrows left to bridge -->
  <line x1="295" y1="110" x2="370" y2="110" stroke="#E65100" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="370" y1="190" x2="295" y2="190" stroke="#C62828" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Arrows bridge to right -->
  <line x1="490" y1="110" x2="540" y2="110" stroke="#1B5E20" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="540" y1="190" x2="490" y2="190" stroke="#C62828" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Domain 1 box -->
  <rect x="540" y="20" width="440" height="480" rx="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2" filter="url(#shadow)"/>
  <text x="760" y="52" text-anchor="middle" font-size="16" font-weight="bold" fill="#1B5E20">Domain 1 — FastDDS</text>

  <!-- RTABMap SLAM -->
  <rect x="565" y="75" width="190" height="70" rx="8" fill="#4CAF50" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="660" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="white">RTABMap SLAM</text>
  <text x="660" y="122" text-anchor="middle" font-size="11" fill="white">ICP Odom + Loop Closure</text>

  <!-- Livox MID360 -->
  <rect x="775" y="75" width="180" height="70" rx="8" fill="#66BB6A" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="865" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Livox MID360</text>
  <text x="865" y="122" text-anchor="middle" font-size="11" fill="white">LiDAR Point Cloud</text>

  <!-- D435 -->
  <rect x="775" y="165" width="180" height="55" rx="8" fill="#66BB6A" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="865" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Intel D435</text>
  <text x="865" y="206" text-anchor="middle" font-size="11" fill="white">Depth + Infrared</text>

  <!-- Nav2 -->
  <rect x="565" y="165" width="190" height="90" rx="8" fill="#4CAF50" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="660" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Nav2</text>
  <text x="660" y="210" text-anchor="middle" font-size="11" fill="white">MPPI Controller</text>
  <text x="660" y="226" text-anchor="middle" font-size="11" fill="white">Costmap + Collision Mon.</text>
  <text x="660" y="242" text-anchor="middle" font-size="11" fill="white">Velocity Smoother</text>

  <!-- Semantic Nav -->
  <rect x="565" y="275" width="190" height="70" rx="8" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="660" y="302" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Semantic Nav</text>
  <text x="660" y="322" text-anchor="middle" font-size="11" fill="white">CLIP Matching + Goals</text>

  <!-- Waypoint Follower -->
  <rect x="565" y="365" width="190" height="55" rx="8" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="660" y="390" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Waypoint Follower</text>
  <text x="660" y="406" text-anchor="middle" font-size="11" fill="white">Chained Nav Goals</text>

  <!-- Semantic Pipeline (offline) -->
  <rect x="775" y="275" width="180" height="145" rx="8" fill="#A5D6A7" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="865" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">Semantic Pipeline</text>
  <text x="865" y="320" text-anchor="middle" font-size="10" fill="#1B5E20">(Offline)</text>
  <text x="865" y="345" text-anchor="middle" font-size="11" fill="#1B5E20">SAM3 Segmentation</text>
  <text x="865" y="365" text-anchor="middle" font-size="11" fill="#1B5E20">Back-projection</text>
  <text x="865" y="385" text-anchor="middle" font-size="11" fill="#1B5E20">DBSCAN Clustering</text>
  <text x="865" y="405" text-anchor="middle" font-size="11" fill="#1B5E20">Semantic Map (JSON)</text>

  <!-- depthimage_to_laserscan -->
  <rect x="565" y="440" width="390" height="45" rx="8" fill="#C8E6C9" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="760" y="467" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">depthimage_to_laserscan  +  pointcloud_to_laserscan</text>

  <!-- Connection arrows inside Domain 1 -->
  <!-- Livox -> SLAM -->
  <line x1="775" y1="110" x2="755" y2="110" stroke="#1B5E20" stroke-width="1.5"/>
  <!-- D435 -> SLAM -->
  <line x1="775" y1="192" x2="755" y2="145" stroke="#1B5E20" stroke-width="1.5"/>
  <!-- Semantic Nav -> Waypoint -->
  <line x1="660" y1="345" x2="660" y2="365" stroke="#1B5E20" stroke-width="1.5"/>
  <!-- Semantic Pipeline -> Semantic Nav -->
  <line x1="775" y1="310" x2="755" y2="310" stroke="#1B5E20" stroke-width="1.5" stroke-dasharray="5,3"/>
</svg>
